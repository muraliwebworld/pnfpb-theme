<svg width="1200" height="480" viewBox="0 0 1200 480" xmlns="http://www.w3.org/2000/svg" style="border-radius:20px;overflow:hidden;">
  <defs>
    <linearGradient id="heroBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#1a3a8f"/>
      <stop offset="48%"  stop-color="#2d2b9f"/>
      <stop offset="100%" stop-color="#5b21b6"/>
    </linearGradient>
    <linearGradient id="megGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#c4b5fd" stop-opacity=".9"/>
    </linearGradient>
    <linearGradient id="devGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#ffffff" stop-opacity=".18"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity=".07"/>
    </linearGradient>
    <linearGradient id="btnGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#60a5fa"/>
      <stop offset="100%" stop-color="#a78bfa"/>
    </linearGradient>
    <radialGradient id="centerGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#818cf8" stop-opacity=".35"/>
      <stop offset="100%" stop-color="#818cf8" stop-opacity="0"/>
    </radialGradient>
    <clipPath id="bannerClip">
      <rect width="1200" height="480" rx="20"/>
    </clipPath>
    <style>
      @keyframes pulse-ring  { 0% { r:62; opacity:.45; } 100% { r:110; opacity:0; } }
      @keyframes pulse-ring2 { 0% { r:62; opacity:.3;  } 100% { r:130; opacity:0; } }
      @keyframes dot-glow    { 0%,100% { opacity:.55; r:3.5; } 50% { opacity:1; r:5; } }
      @keyframes beam        { 0% { stroke-dashoffset:200; opacity:0; } 15% { opacity:.7; } 80% { opacity:.7; } 100% { stroke-dashoffset:0; opacity:0; } }
      @keyframes notif-pop   { 0%,85%,100% { opacity:0; transform:translateY(8px) scale(.9); } 88%,96% { opacity:1; transform:translateY(0) scale(1); } }
      .pr1 { animation: pulse-ring  2.8s ease-out infinite; }
      .pr2 { animation: pulse-ring2 2.8s ease-out infinite .9s; }
      .b1  { stroke-dasharray:200; animation: beam 3.2s ease-in-out infinite .4s; }
      .b2  { stroke-dasharray:200; animation: beam 3.2s ease-in-out infinite 1.1s; }
      .b3  { stroke-dasharray:200; animation: beam 3.2s ease-in-out infinite 1.8s; }
      .b4  { stroke-dasharray:200; animation: beam 3.2s ease-in-out infinite 2.4s; }
      .dg1 { animation: dot-glow 2.2s ease-in-out infinite .2s; }
      .dg2 { animation: dot-glow 2.2s ease-in-out infinite .8s; }
      .dg3 { animation: dot-glow 2.2s ease-in-out infinite 1.4s; }
      .dg4 { animation: dot-glow 2.2s ease-in-out infinite 1.9s; }
      .np1 { animation: notif-pop 3.2s ease-in-out infinite .4s; }
      .np2 { animation: notif-pop 3.2s ease-in-out infinite 1.6s; }
      .np3 { animation: notif-pop 3.2s ease-in-out infinite 2.5s; }
    </style>
  </defs>

  <g clip-path="url(#bannerClip)">
    <rect width="1200" height="480" fill="url(#heroBg)"/>

    <g stroke="#ffffff" stroke-width="0.4" opacity="0.06">
      <line x1="0" y1="80" x2="1200" y2="80"/><line x1="0" y1="160" x2="1200" y2="160"/>
      <line x1="0" y1="240" x2="1200" y2="240"/><line x1="0" y1="320" x2="1200" y2="320"/>
      <line x1="0" y1="400" x2="1200" y2="400"/>
      <line x1="150" y1="0" x2="150" y2="480"/><line x1="300" y1="0" x2="300" y2="480"/>
      <line x1="450" y1="0" x2="450" y2="480"/><line x1="600" y1="0" x2="600" y2="480"/>
      <line x1="750" y1="0" x2="750" y2="480"/><line x1="900" y1="0" x2="900" y2="480"/>
      <line x1="1050" y1="0" x2="1050" y2="480"/>
    </g>
    <g stroke="#a78bfa" stroke-width="0.5" opacity="0.12">
      <line x1="0" y1="480" x2="480" y2="0"/><line x1="200" y1="480" x2="680" y2="0"/>
      <line x1="720" y1="0" x2="1200" y2="480"/><line x1="520" y1="0" x2="1000" y2="480"/>
    </g>

    <ellipse cx="600" cy="240" rx="220" ry="200" fill="url(#centerGlow)"/>
    <circle class="pr1" cx="600" cy="235" r="62" fill="none" stroke="#818cf8" stroke-width="1.5"/>
    <circle class="pr2" cx="600" cy="235" r="62" fill="none" stroke="#c4b5fd" stroke-width="1"/>

    <path d="M 660 210 A 40 40 0 0 1 660 260" fill="none" stroke="white" stroke-width="3.5" stroke-linecap="round" opacity="0.5"/>
    <path d="M 675 195 A 56 56 0 0 1 675 275" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" opacity="0.32"/>
    <path d="M 692 178 A 74 74 0 0 1 692 292" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" opacity="0.18"/>

    <rect x="545" y="220" width="34" height="30" rx="7" fill="url(#megGrad)" opacity=".95"/>
    <polygon points="579,214 655,185 655,285 579,256" fill="url(#megGrad)" opacity=".95"/>
    <ellipse cx="655" cy="235" rx="7" ry="50" fill="white" opacity=".18"/>

    <line class="b1" x1="543" y1="235" x2="220" y2="195" stroke="#93c5fd" stroke-width="1.5" fill="none"/>
    <line class="b2" x1="556" y1="218" x2="340" y2="120" stroke="#c4b5fd" stroke-width="1.5" fill="none"/>
    <line class="b3" x1="543" y1="252" x2="210" y2="340" stroke="#93c5fd" stroke-width="1.5" fill="none"/>
    <line class="b4" x1="672" y1="220" x2="920" y2="148" stroke="#c4b5fd" stroke-width="1.5" fill="none"/>
    <line class="b1" x1="672" y1="250" x2="950" y2="330" stroke="#a5f3fc" stroke-width="1.5" fill="none"/>

    <circle class="dg1" cx="140" cy="140" r="3.5" fill="#93c5fd"/>
    <circle class="dg2" cx="420" cy="68" r="3" fill="#c4b5fd"/>
    <circle class="dg3" cx="780" cy="72" r="3.5" fill="#a5f3fc"/>
    <circle class="dg4" cx="1060" cy="160" r="3" fill="#93c5fd"/>
    <circle cx="310" cy="400" r="2.5" fill="#818cf8" opacity=".5"/>
    <circle cx="880" cy="420" r="2.5" fill="#a78bfa" opacity=".5"/>

    <!-- Desktop -->
    <g opacity="0.92">
      <rect x="130" y="148" width="174" height="114" rx="8" fill="url(#devGrad)" stroke="white" stroke-width="1.2" stroke-opacity=".35"/>
      <rect x="144" y="162" width="80" height="6" rx="3" fill="white" opacity=".25"/>
      <rect x="144" y="174" width="120" height="4" rx="2" fill="white" opacity=".16"/>
      <rect x="144" y="184" width="100" height="4" rx="2" fill="white" opacity=".13"/>
      <rect x="205" y="262" width="8" height="24" rx="2" fill="white" opacity=".3"/>
      <rect x="186" y="284" width="46" height="5" rx="3" fill="white" opacity=".25"/>
      <g class="np1">
        <rect x="236" y="152" width="66" height="30" rx="8" fill="#1e40af" stroke="#93c5fd" stroke-width="1"/>
        <circle cx="248" cy="167" r="5" fill="#60a5fa"/>
        <rect x="258" y="161" width="36" height="4" rx="2" fill="white" opacity=".9"/>
        <rect x="258" y="169" width="28" height="3" rx="1.5" fill="#93c5fd" opacity=".8"/>
      </g>
    </g>

    <!-- Tablet -->
    <g opacity="0.9">
      <rect x="295" y="74" width="90" height="118" rx="10" fill="url(#devGrad)" stroke="white" stroke-width="1.2" stroke-opacity=".35"/>
      <rect x="332" y="178" width="16" height="4" rx="2" fill="white" opacity=".4"/>
      <rect x="307" y="86" width="66" height="5" rx="2" fill="white" opacity=".22"/>
      <g class="np2">
        <rect x="305" y="122" width="70" height="28" rx="7" fill="#312e81" stroke="#c4b5fd" stroke-width=".8"/>
        <circle cx="316" cy="136" r="4" fill="#a78bfa"/>
        <rect x="325" y="131" width="40" height="3" rx="1.5" fill="white" opacity=".9"/>
        <rect x="325" y="138" width="30" height="3" rx="1.5" fill="#c4b5fd" opacity=".7"/>
      </g>
    </g>

    <!-- Smartphone -->
    <g opacity="0.92">
      <rect x="158" y="288" width="100" height="166" rx="16" fill="url(#devGrad)" stroke="white" stroke-width="1.2" stroke-opacity=".35"/>
      <rect x="193" y="288" width="30" height="8" rx="4" fill="#0f172a" opacity=".5"/>
      <rect x="190" y="442" width="36" height="4" rx="2" fill="white" opacity=".4"/>
      <rect x="170" y="306" width="18" height="18" rx="5" fill="white" opacity=".14"/>
      <rect x="193" y="306" width="18" height="18" rx="5" fill="white" opacity=".14"/>
      <rect x="216" y="306" width="18" height="18" rx="5" fill="white" opacity=".14"/>
      <rect x="170" y="330" width="18" height="18" rx="5" fill="white" opacity=".14"/>
      <rect x="193" y="330" width="18" height="18" rx="5" fill="white" opacity=".14"/>
      <rect x="216" y="330" width="18" height="18" rx="5" fill="white" opacity=".14"/>
      <g class="np3">
        <rect x="166" y="358" width="84" height="36" rx="10" fill="#1e3a5f" stroke="#60a5fa" stroke-width=".8"/>
        <circle cx="179" cy="376" r="5" fill="#3b82f6"/>
        <rect x="189" y="371" width="52" height="4" rx="2" fill="white" opacity=".9"/>
        <rect x="189" y="379" width="38" height="3" rx="1.5" fill="#93c5fd" opacity=".75"/>
      </g>
    </g>

    <!-- Android -->
    <g opacity="0.9">
      <rect x="855" y="96" width="92" height="156" rx="14" fill="url(#devGrad)" stroke="white" stroke-width="1.2" stroke-opacity=".35"/>
      <circle cx="901" cy="107" r="4" fill="white" opacity=".2"/>
      <rect x="867" y="116" width="68" height="3" rx="1.5" fill="white" opacity=".18"/>
      <rect x="878" y="238" width="16" height="3" rx="2" fill="white" opacity=".35"/>
      <g class="np1">
        <rect x="865" y="157" width="78" height="36" rx="10" fill="#1c1b4b" stroke="#818cf8" stroke-width=".8"/>
        <circle cx="878" cy="175" r="5" fill="#6366f1"/>
        <rect x="888" y="170" width="46" height="4" rx="2" fill="white" opacity=".9"/>
        <rect x="888" y="178" width="34" height="3" rx="1.5" fill="#a5b4fc" opacity=".75"/>
      </g>
    </g>

    <!-- iOS -->
    <g opacity="0.88">
      <rect x="920" y="278" width="88" height="152" rx="20" fill="url(#devGrad)" stroke="white" stroke-width="1.2" stroke-opacity=".35"/>
      <rect x="942" y="284" width="44" height="10" rx="5" fill="#0f172a" opacity=".55"/>
      <rect x="947" y="420" width="34" height="4" rx="2" fill="white" opacity=".4"/>
      <rect x="932" y="304" width="20" height="20" rx="6" fill="white" opacity=".13"/>
      <rect x="956" y="304" width="20" height="20" rx="6" fill="white" opacity=".13"/>
      <rect x="980" y="304" width="20" height="20" rx="6" fill="white" opacity=".13"/>
      <rect x="932" y="330" width="20" height="20" rx="6" fill="white" opacity=".13"/>
      <rect x="956" y="330" width="20" height="20" rx="6" fill="white" opacity=".13"/>
      <rect x="980" y="330" width="20" height="20" rx="6" fill="white" opacity=".13"/>
      <g class="np2">
        <rect x="930" y="360" width="80" height="38" rx="12" fill="#1a2744" stroke="#93c5fd" stroke-width=".8"/>
        <circle cx="944" cy="379" r="5" fill="#38bdf8"/>
        <rect x="955" y="374" width="46" height="4" rx="2" fill="white" opacity=".9"/>
        <rect x="955" y="382" width="34" height="3" rx="1.5" fill="#7dd3fc" opacity=".75"/>
      </g>
    </g>

    <!-- Corner decoration -->
    <g opacity="0.1">
      <circle cx="1150" cy="50" r="90" fill="none" stroke="white" stroke-width="1"/>
      <circle cx="1150" cy="50" r="60" fill="none" stroke="white" stroke-width="0.5"/>
    </g>
    <g opacity="0.1">
      <circle cx="50" cy="430" r="70" fill="none" stroke="white" stroke-width="1"/>
      <circle cx="50" cy="430" r="40" fill="none" stroke="white" stroke-width="0.5"/>
    </g>

    <!-- Badge -->
    <rect x="770" y="138" width="172" height="26" rx="13" fill="white" fill-opacity=".12" stroke="white" stroke-width=".8" stroke-opacity=".3"/>
    <circle cx="786" cy="151" r="5" fill="#34d399"/>
    <text x="797" y="156" font-family="system-ui,sans-serif" font-size="12" font-weight="500" fill="white" opacity=".9">WordPress Plugin</text>

    <text x="770" y="202" font-family="system-ui,sans-serif" font-size="13" font-weight="500" fill="#93c5fd" letter-spacing="2.5" opacity=".85">PNFPB</text>
    <text x="770" y="248" font-family="system-ui,sans-serif" font-size="38" font-weight="700" fill="white" letter-spacing="-0.5">Instant Notifications</text>
    <text x="770" y="294" font-family="system-ui,sans-serif" font-size="38" font-weight="700" fill="white" letter-spacing="-0.5">Across All Devices</text>
    <rect x="770" y="308" width="40" height="2.5" rx="2" fill="url(#btnGrad)"/>
    <text x="770" y="336" font-family="system-ui,sans-serif" font-size="15" font-weight="400" fill="white" opacity=".72">Push Notifications for Posts &amp; BuddyPress</text>
    <text x="770" y="358" font-family="system-ui,sans-serif" font-size="15" font-weight="400" fill="white" opacity=".72">Desktop · PWA · Android &amp; iOS Apps</text>

    <rect x="770" y="382" width="160" height="44" rx="10" fill="url(#btnGrad)"/>
    <text x="850" y="409" font-family="system-ui,sans-serif" font-size="14" font-weight="600" fill="white" text-anchor="middle">Get Started Free</text>
    <rect x="942" y="382" width="140" height="44" rx="10" fill="white" fill-opacity=".1" stroke="white" stroke-width=".8" stroke-opacity=".4"/>
    <text x="1012" y="409" font-family="system-ui,sans-serif" font-size="14" font-weight="500" fill="white" text-anchor="middle" opacity=".85">View Demo</text>
  </g>
</svg>
